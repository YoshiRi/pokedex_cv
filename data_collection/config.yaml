# Data collection configuration
# Edit this file to control what gets collected.

output_dir: raw_images

sources:
  pokeapi_sprites:
    enabled: true
    # Available: front_default, back_default, front_shiny, back_shiny, official_artwork, home
    sprite_types:
      - front_default
      - back_default
      - front_shiny
      - back_shiny
      - official_artwork
      - home
    rate_limit:
      requests_per_second: 5
    concurrency: 8

  bulbapedia:
    enabled: false  # not yet implemented
    rate_limit:
      requests_per_second: 1
    concurrency: 2

filters:
  dedup:
    enabled: true
    phash_threshold: 5          # Hamming distance threshold
  quality:
    enabled: true
    min_width: 32
    min_height: 32
    min_nontransparent_pixels: 10
    min_laplacian_variance: 50  # blur threshold (ignored for small sprites)
    small_sprite_threshold: 128 # px; images smaller than this skip blur check

# null = collect all 1025 Pokemon
# list of ints = collect only these national Pokedex IDs
pokemon_ids: null
